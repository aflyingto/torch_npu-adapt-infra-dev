name: Ascend/pytorch Nightly Build Validation

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = Beijing 10:00
  workflow_dispatch:
    inputs:
      torch_nightly_date:
        description: 'PyTorch nightly date (YYYYMMDD format, e.g., 20260307)'
        required: false
        type: string
  push:
    paths:
      - '.github/workflows/nightly-build.yml'
      - 'patches/**'
      - 'CLAUDE.md'

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    name: Build torch_npu (x86, PyTorch nightly)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc g++ git patchelf ccache

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
            ccache-${{ runner.os }}-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "CC=ccache gcc" >> $GITHUB_ENV
          echo "CXX=ccache g++" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Install PyTorch nightly
        id: install-torch
        run: |
          python -m pip install --upgrade pip
          DATE="${{ inputs.torch_nightly_date }}"
          if [ -n "$DATE" ]; then
            # Try different major versions (PyTorch nightly version bumps over time)
            for MAJOR in "2.12.0" "2.11.0" "2.10.0"; do
              VERSION="${MAJOR}.dev${DATE}+cpu"
              if python -m pip install "torch==${VERSION}" --index-url https://download.pytorch.org/whl/nightly/cpu; then
                echo "Successfully installed torch==${VERSION}"
                echo "torch_version=${VERSION}" >> $GITHUB_OUTPUT
                echo "PyTorch version: ${VERSION}"
                exit 0
              fi
            done
            echo "ERROR: No torch version found for date ${DATE}"
            exit 1
          else
            python -m pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cpu
            VERSION=$(python -c "import torch; print(torch.__version__)")
            echo "torch_version=${VERSION}" >> $GITHUB_OUTPUT
            echo "PyTorch version: ${VERSION}"
          fi

      - name: Clone Ascend/pytorch
        id: clone
        run: |
          git clone --depth=1 --recurse-submodules https://github.com/Ascend/pytorch.git ascend_pytorch
          cd ascend_pytorch
          COMMIT_HASH=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format=%cd --date=short)
          echo "commit_hash=${COMMIT_HASH}" >> $GITHUB_OUTPUT
          echo "commit_short=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "commit_date=${COMMIT_DATE}" >> $GITHUB_OUTPUT
          echo "Ascend/pytorch commit: ${COMMIT_HASH}"

      - name: Install Python build dependencies
        run: |
          python -m pip install pyyaml setuptools auditwheel

      - name: Apply compatibility patches
        id: patches
        run: |
          PATCH_DIR="patches"
          PATCH_APPLIED=""
          PATCH_FAILED=""
          for p in "${PATCH_DIR}"/*.patch; do
            [ -f "$p" ] || continue
            PATCH_NAME=$(basename "$p")
            if git apply --directory=ascend_pytorch "$p"; then
              echo "Applied: ${PATCH_NAME}"
              if [ -n "$PATCH_APPLIED" ]; then
                PATCH_APPLIED="${PATCH_APPLIED}, ${PATCH_NAME}"
              else
                PATCH_APPLIED="${PATCH_NAME}"
              fi
            else
              echo "Failed to apply: ${PATCH_NAME}"
              if [ -n "$PATCH_FAILED" ]; then
                PATCH_FAILED="${PATCH_FAILED}, ${PATCH_NAME}"
              else
                PATCH_FAILED="${PATCH_NAME}"
              fi
            fi
          done
          echo "applied=${PATCH_APPLIED}" >> $GITHUB_OUTPUT
          echo "failed=${PATCH_FAILED}" >> $GITHUB_OUTPUT
          if [ -n "$PATCH_FAILED" ]; then
            echo "::warning::Failed patches: ${PATCH_FAILED}"
          fi

      - name: Build CANN stub libraries
        run: |
          bash ascend_pytorch/third_party/acl/libs/build_stub.sh

      - name: Build wheel
        id: build
        run: |
          cd ascend_pytorch
          export DISABLE_INSTALL_TORCHAIR=FALSE
          export BUILD_WITHOUT_SHA=1
          set -o pipefail
          python setup.py build bdist_wheel 2>&1 | tee /tmp/build.log
          BUILD_STATUS=${PIPESTATUS[0]}
          echo "status=${BUILD_STATUS}" >> $GITHUB_OUTPUT
          if [ ${BUILD_STATUS} -eq 0 ]; then
            echo "## Build Success" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Generated wheel files:" >> $GITHUB_STEP_SUMMARY
            while IFS= read -r wheel; do
              echo "- \`${wheel}\`" >> $GITHUB_STEP_SUMMARY
            done < <(find dist -name "*.whl" -type f)
          else
            echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "Check the build-log artifact for details." >> $GITHUB_STEP_SUMMARY
          fi
          exit ${BUILD_STATUS}

      - name: Show ccache statistics
        if: always()
        run: |
          echo "## CCache Statistics" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache --show-stats >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 7

      - name: Upload wheel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: torch-npu-wheel-${{ github.run_number }}
          path: ascend_pytorch/dist/*.whl
          retention-days: 7

      - name: Output build summary
        if: always()
        run: |
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 详情 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| PyTorch Nightly 版本 | ${{ steps.install-torch.outputs.torch_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ascend/pytorch Commit | [\`${{ steps.clone.outputs.commit_short }}\`](https://github.com/Ascend/pytorch/commit/${{ steps.clone.outputs.commit_hash }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit 时间 | ${{ steps.clone.outputs.commit_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 已应用 Patch | ${{ steps.patches.outputs.applied }} |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.patches.outputs.failed }}" ]; then
            echo "| 失败 Patch | ${{ steps.patches.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| 构建结果 | ${{ job.status == 'success' && '✅ SUCCESS' || '❌ FAILED' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output compatibility issues report
          if [ -d "issues" ]; then
            echo "## 兼容性问题分析报告" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for issue in issues/*.md; do
              [ -f "$issue" ] || continue
              echo "### $(basename "$issue" .md)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              # Extract problem description
              sed -n '/^## 问题描述/,/^## /p' "$issue" | head -n -1 >> $GITHUB_STEP_SUMMARY
              # Extract root cause analysis
              sed -n '/^## 根本原因分析/,/^## /p' "$issue" | head -n -1 >> $GITHUB_STEP_SUMMARY
              # Extract fix solution
              sed -n '/^## 修复方案/,/^## /p' "$issue" | head -n -1 >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "---" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            done
          fi