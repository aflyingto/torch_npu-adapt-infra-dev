name: Ascend/pytorch Nightly Build Validation

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（北京时间 10:00）
  workflow_dispatch:
    inputs:
      torch_nightly_date:
        description: 'PyTorch nightly 日期 (格式: YYYYMMDD，留空使用最新版)'
        required: false
        default: ''
  push:
    paths:
      - '.github/workflows/nightly-build.yml'
      - 'patches/**'
      - 'AGENTS.md'

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    name: Build torch_npu (x86, PyTorch nightly)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            gcc g++ \
            git \
            patchelf \
            ccache

      - name: Install PyTorch nightly (CPU, x86_64)
        id: install_torch
        run: |
          pip install --upgrade pip
          DATE="${{ github.event.inputs.torch_nightly_date }}"
          if [ -n "$DATE" ]; then
            # 依次尝试不同主版本号
            for MAJOR in "2.12.0" "2.11.0" "2.10.0"; do
              VERSION="${MAJOR}.dev${DATE}+cpu"
              echo "尝试安装 torch==${VERSION}..."
              if pip install --pre "torch==${VERSION}" --index-url https://download.pytorch.org/whl/nightly/cpu 2>/dev/null; then
                echo "成功安装 torch==${VERSION}"
                break
              fi
            done
          else
            pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cpu
          fi
          TORCH_VER=$(python -c "import torch; print(torch.__version__)")
          echo "version=${TORCH_VER}" >> $GITHUB_OUTPUT
          echo "PyTorch nightly version: ${TORCH_VER}"

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-torch${{ steps.install_torch.outputs.version }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-torch${{ steps.install_torch.outputs.version }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-torch${{ steps.install_torch.outputs.version }}-
            ccache-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
            ccache-${{ runner.os }}-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "CC=ccache gcc" >> $GITHUB_ENV
          echo "CXX=ccache g++" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Clone Ascend/pytorch (with submodules)
        id: clone_repo
        run: |
          # Configure git URL rewrite for gitee mirrors that require authentication
          git config --global url."https://github.com/libuv/libuv".insteadOf "https://gitee.com/mirrors/libuv"
          git clone --depth=1 --recurse-submodules \
            https://github.com/Ascend/pytorch.git ascend_pytorch
          cd ascend_pytorch
          COMMIT=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format='%ci')
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "commit_short=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "commit_date=${COMMIT_DATE}" >> $GITHUB_OUTPUT
          echo "Ascend/pytorch commit: ${COMMIT} (${COMMIT_DATE})"

      - name: Install Python build dependencies
        run: |
          cd ascend_pytorch
          pip install pyyaml setuptools auditwheel

      - name: Apply compatibility patches
        id: patch
        run: |
          PATCH_DIR="${GITHUB_WORKSPACE}/patches"
          PATCH_APPLIED=""
          PATCH_FAILED=""
          for p in "${PATCH_DIR}"/*.patch; do
            [ -f "$p" ] || continue
            echo "Applying patch: $(basename $p)"
            if git apply --directory=ascend_pytorch "$p"; then
              echo "  OK"
              PATCH_APPLIED="${PATCH_APPLIED} $(basename $p)"
            else
              echo "  FAILED (may already be merged upstream)"
              PATCH_FAILED="${PATCH_FAILED} $(basename $p)"
            fi
          done
          echo "applied=${PATCH_APPLIED}" >> $GITHUB_OUTPUT
          echo "failed=${PATCH_FAILED}"   >> $GITHUB_OUTPUT

      - name: Build torch_npu wheel
        id: build
        run: |
          cd ascend_pytorch
          export DISABLE_INSTALL_TORCHAIR=FALSE
          export BUILD_WITHOUT_SHA=1
          START_TIME=$(date +%s)
          python setup.py build bdist_wheel 2>&1 | tee /tmp/build.log
          BUILD_STATUS=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "status=${BUILD_STATUS}" >> $GITHUB_OUTPUT
          echo "duration=${DURATION}" >> $GITHUB_OUTPUT
          if [ ${BUILD_STATUS} -eq 0 ]; then
            WHL=$(ls dist/*.whl 2>/dev/null | head -1)
            echo "wheel=${WHL}" >> $GITHUB_OUTPUT
            echo "Build succeeded: ${WHL}"
          fi
          exit ${BUILD_STATUS}

      - name: Show ccache statistics
        if: always()
        run: |
          echo "## CCache Statistics" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache --show-stats >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/build.log
          if-no-files-found: warn

      - name: Upload wheel
        if: steps.build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: torch_npu-wheel-${{ github.run_number }}
          path: ascend_pytorch/dist/*.whl
          if-no-files-found: warn

      - name: Build summary
        if: always()
        run: |
          BUILD_STATUS="${{ steps.build.outputs.status }}"
          BUILD_DURATION="${{ steps.build.outputs.duration }}"
          if [ "${BUILD_STATUS}" = "0" ]; then
            STATUS_ICON="SUCCESS"
          else
            STATUS_ICON="FAILED"
          fi

          # Format build duration
          if [ -n "${BUILD_DURATION}" ] && [ "${BUILD_DURATION}" -gt 0 ] 2>/dev/null; then
            MINUTES=$((BUILD_DURATION / 60))
            SECONDS=$((BUILD_DURATION % 60))
            DURATION_FMT="${MINUTES}m ${SECONDS}s"
          else
            DURATION_FMT="N/A"
          fi

          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Duration | ${DURATION_FMT} |" >> $GITHUB_STEP_SUMMARY
          echo "| PyTorch Nightly | \`${{ steps.install_torch.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Ascend/pytorch Commit | [\`${{ steps.clone_repo.outputs.commit_short }}\`](https://github.com/Ascend/pytorch/commit/${{ steps.clone_repo.outputs.commit }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit Time | ${{ steps.clone_repo.outputs.commit_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Applied Patches | ${{ steps.patch.outputs.applied || '(None)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Result | ${STATUS_ICON} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output compatibility issues report
          if [ -d "issues" ]; then
            echo "## Compatibility Issues Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for issue in issues/*.md; do
              [ -f "$issue" ] || continue
              echo "### $(basename "$issue" .md)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              sed -n '/^## 问题描述/,/^## /p' "$issue" | head -n -1 >> $GITHUB_STEP_SUMMARY
              sed -n '/^## 根本原因分析/,/^## /p' "$issue" | head -n -1 >> $GITHUB_STEP_SUMMARY
              sed -n '/^## 修复方案/,/^## /p' "$issue" | head -n -1 >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "---" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            done
          fi

          # Output build result
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${BUILD_STATUS}" = "0" ]; then
            echo "Build succeeded" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Wheel: \`${{ steps.build.outputs.wheel }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "Build failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check build-log artifact for details" >> $GITHUB_STEP_SUMMARY
          fi